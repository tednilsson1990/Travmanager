<!--
  Inget byggsteg. Beroenden hämtas som ES-moduler.

  VERSIONSNUMRET: importkartan pekar varje modul till samma fil med ?v=N.
  Höj N här nere när något ändrats — OCH i sw.js, det är samma nummer.
  Utan detta cachas modulerna var för sig och ändringar syns inte, hur
  många gånger man än laddar om sidan.
-->
<script>
/* Felgräns som fångar även laddningsfel — körs innan modulerna hämtas,
   så en trasig import ger ett meddelande i stället för svart skärm. */
window.addEventListener("error", (e) => {
  const rot = document.getElementById("root");
  if (!rot || rot.childElementCount) return;
  const text = String((e.error && e.error.message) || e.message || "okänt fel");
  rot.innerHTML = '<div class="felruta"><div class="fel-rubrik">Något gick fel</div>' +
    '<div class="fel-text">' + text.replace(/</g, "&lt;") + '</div>' +
    '<div class="fel-hjalp">Din karriär är sparad och ligger kvar. Ladda om sidan — ' +
    'eller skicka meddelandet ovan vidare, det räcker för att hitta felet.</div></div>';
});
window.addEventListener("unhandledrejection", (e) => {
  window.dispatchEvent(new ErrorEvent("error", { message: String(e.reason?.message || e.reason || "okänt fel") }));
});
if ("serviceWorker" in navigator) {
  addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
}
/* VAKTHUNDEN v2. Är sidan tom efter fem sekunder har modulgrafen
   aldrig börjat köra — och iOS Safari berättar inte varför. Då tar
   vakthunden reda på det själv: provimporterar main.js, och om den
   fallerar provas varje modul ur importmappen tills syndaren hittas.
   Skärmen visar filnamn och exakt felmeddelande — konsolen på skärmen. */
setTimeout(async () => {
  const rot = document.getElementById("root");
  if (!rot || rot.childElementCount) return;
  const visa = (rubrik, rader) => {
    rot.innerHTML = '<div class="felruta"><div class="fel-rubrik">' + rubrik + ' (v58)</div>' +
      '<div class="fel-text">' + rader.map((r) => String(r).replace(/</g, "&lt;")).join("<br><br>") + '</div>' +
      '<div class="fel-hjalp">Din karriär är sparad och ligger kvar. Skicka texten ovan vidare — den räcker för att laga felet.</div></div>';
  };
  let karta;
  try { karta = JSON.parse(document.querySelector("script[type=importmap]").textContent).imports; }
  catch (e) { visa("Importmappen är trasig", [e.message]); return; }
  /* Saknas filer på servern? */
  const lokala = Object.values(karta).filter((u) => u.startsWith("./"));
  const status = await Promise.all(lokala.map((u) =>
    fetch(u, { method: "HEAD", cache: "no-store" }).then((r) => [u, r.status]).catch(() => [u, 0])));
  const saknade = status.filter(([, st]) => st !== 200);
  if (saknade.length) {
    visa("Filer saknas på servern", saknade.map(([u, st]) => u + " — " + (st || "nätfel")));
    return;
  }
  /* Alla filer finns — hitta modulen som vägrar köra. */
  try {
    await import(karta["./main.js"] ?? "./main.js");
    visa("Modulerna kör men sidan är tom", ["Hela grafen laddade utan fel — kraschen sker i renderingen. Skicka en skärmbild av webbläsarkonsolen."]);
  } catch (huvudfel) {
    for (const [namn, url] of Object.entries(karta)) {
      if (!url.startsWith("./") || namn === "./main.js") continue;
      try { await import(url); }
      catch (e) { visa("Felet sitter i " + namn, [e.name + ": " + e.message]); return; }
    }
    visa("Felet sitter i ./main.js", [huvudfel.name + ": " + huvudfel.message]);
  }
}, 5000);
</script>
